name: Build Android APK

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "swcnt-mobile-lite/**"
      - ".github/workflows/android-apk.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "swcnt-mobile-lite/package-lock.json"

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "build-tools;36.0.0" "platforms;android-36"

      - name: Install Dependencies
        working-directory: swcnt-mobile-lite
        run: npm ci

      - name: Build Debug APK
        working-directory: swcnt-mobile-lite
        run: npm run android:build:debug:ci

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: swcnt-lite-debug-apk
          path: swcnt-mobile-lite/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Attach APK To GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: swcnt-mobile-lite/android/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
